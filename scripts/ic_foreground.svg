<svg xmlns="http://www.w3.org/2000/svg" width="108" height="108" viewBox="0 0 108 108" fill="none">
  <!--
    M mark from design/mnemos-v2.html MnemosMark function (64x64 viewBox).
    Stroke widths bumped for launcher visibility: outer 6, inner 4.
    Visual bounds: x=[6,58], y=[11,55] — approx 52w x 44h.
    Geometric center: (32, 33).
    V chevron at y=[24,38] creates visual weight in upper half, pulling
    perceived center ~2 units above geometric. Compensate by pushing the
    geometric center 2 units below the 108px canvas center (54, 54):
    translateX = 54 - 32 = 22
    translateY = 54 - 33 + 2 = 23
    Content stays within 66dp safe zone: x=[22+6, 22+58]=[28,80],
    y=[23+11, 23+55]=[34, 78] — well inside safe zone margins (21–87).
  -->
  <g transform="translate(22, 23)">
    <path d="M10 52 L10 14 L20 14 L32 30 L44 14 L54 14 L54 52"
      stroke="#2D2920" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter"/>
    <path d="M22 24 L32 38 L42 24"
      stroke="#B86A30" stroke-width="4" stroke-linecap="square" stroke-linejoin="miter"/>
    <rect x="6" y="50" width="12" height="4" fill="#2D2920"/>
    <rect x="46" y="50" width="12" height="4" fill="#2D2920"/>
  </g>
</svg>
